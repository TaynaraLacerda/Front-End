<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introdução ao CSS</title>
    <style>
        body{
            /* Cor de plano de fundo */
            background-color: blanchedalmond;
        }
        h1 {
            /* Cor da Fonte */
            color: blue;
            /* center, left ,rigth */
            text-align: center; 
            /* Tamanho da fonte */
            font-size: 60px;
            /* Estilo de fonte */
            font-family: Arial;
        }
        p{
            /* Espaçamento externo da página */
            margin: 100px; ; 
        }
        img{
            /* Largura */
            width: 300px ;
            /* Altura */
            height: 80px ;
            /*  */
            margin-bottom: 100px;
        }
        
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. </p>
    <img src="capa.png" alt="">
    







</body>
</html>
